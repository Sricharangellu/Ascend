name: CI

# ─── Trigger rules ─────────────────────────────────────────────────────────────
# master  → full CI + deploy to PRODUCTION  (finder-pos-frontend.vercel.app)
# staging → full CI + deploy to STAGING     (Vercel preview URL, isolated DB)
# PRs     → full CI, no deploy
# feature → no CI (local dev + pre-push hook)
on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

# ─── Shared test jobs (run on every trigger) ──────────────────────────────────
jobs:
  guard:
    name: Production guard — lint anti-patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No unguarded mutation routes (router.patch/delete without requireRole)
        run: |
          ! grep -rn --include="*routes.ts" -A1 "router\.\(patch\|delete\|put\)" src/ \
            | grep -B1 "handler(" \
            | grep -v "requireRole\|//\s*no auth" \
            | grep "router\.\(patch\|delete\|put\)" \
            | grep -v "test\|spec" \
            || echo "All mutation routes have role guards ✓"
      - name: No console.log/error in production source (modules + gateway)
        run: |
          count=$(grep -rn --include="*.ts" "console\.\(log\|error\|warn\)" src/modules/ src/gateway/ \
            | grep -v "\.test\.ts" | wc -l | tr -d ' ')
          echo "Remaining console.* calls in modules/gateway: $count"
          if [ "$count" -gt "0" ]; then
            grep -rn --include="*.ts" "console\.\(log\|error\|warn\)" src/modules/ src/gateway/ | grep -v "\.test\.ts"
            exit 1
          fi
      - name: No raw SQL string interpolation (SQL injection risk)
        run: |
          ! grep -rn --include="*.ts" "\.query\(\`.*\${" src/modules/ src/gateway/ \
            | grep -v "\.test\.ts\|set_config\|schema" \
            || (echo "❌ Raw string interpolation in SQL — use @param syntax" && exit 1)
          echo "No raw SQL interpolation found ✓"

  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finder_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finder_test
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  # ─── Staging deploy (push to staging branch only) ──────────────────────────
  # Deploys to a Vercel PREVIEW URL (no --prod flag).
  # Uses STAGING_DATABASE_URL and STAGING_JWT_SECRET secrets (isolated DB).
  # Preview URL is unique per deployment — check Vercel dashboard for the URL.
  deploy-staging:
    name: Deploy → Staging (Vercel preview)
    needs: [guard, backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    defaults:
      run:
        working-directory: web
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Deploy as Vercel preview (no --prod flag) → unique preview URL.
      # Set STAGING env vars in Vercel dashboard under the staging environment.
      - name: Deploy to Vercel staging
        id: deploy
        run: |
          url=$(npx vercel --yes --token "$VERCEL_TOKEN" 2>&1 | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $url"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Staging smoke test
        run: |
          sleep 10
          BACKEND_URL="${{ secrets.STAGING_BACKEND_URL }}"
          curl -f --retry 3 --retry-delay 5 "${BACKEND_URL}/healthz" \
            || echo "⚠️  Staging backend not reachable — check STAGING_BACKEND_URL secret"

  # ─── Production deploy (push to master branch only) ────────────────────────
  # Deploys to the PRODUCTION Vercel URL with --prod flag.
  # Only runs after all test jobs pass AND only on master.
  deploy-production:
    name: Deploy → Production (Vercel --prod)
    needs: [guard, backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    defaults:
      run:
        working-directory: web
    environment:
      name: production
      url: https://finder-pos-frontend.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ─── Production smoke test ─────────────────────────────────────────────────
  smoke-test:
    name: Post-deploy smoke test (production)
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel propagation
        run: sleep 15
      - name: Health check — backend liveness
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/healthz \
            || (echo "❌ /healthz failed" && exit 1)
      - name: Health check — backend readiness
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/readyz \
            || (echo "❌ /readyz failed" && exit 1)
      - name: Health check — feature flags endpoint
        run: |
          curl -f --retry 2 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/api/v1/flags \
            || (echo "❌ /api/v1/flags failed" && exit 1)
      - name: Health check — frontend
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-frontend.vercel.app/ \
            || (echo "❌ frontend failed" && exit 1)
