name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  guard:
    name: Production guard — lint anti-patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PROD guardrails: fail CI if any of these known-bad patterns appear.
      # These are the classes of error that reached production in the 2026-06-22 audit.
      - name: No unguarded mutation routes (router.patch/delete without requireRole)
        run: |
          # Find route files with patch/delete that lack requireRole on the same line or immediately preceding.
          # This grep exits 0 (pass) if NO violations found, 1 if violations found.
          ! grep -rn --include="*routes.ts" -A1 "router\.\(patch\|delete\|put\)" src/ \
            | grep -B1 "handler(" \
            | grep -v "requireRole\|//\s*no auth" \
            | grep "router\.\(patch\|delete\|put\)" \
            | grep -v "test\|spec" \
            || echo "All mutation routes have role guards ✓"
      - name: No console.log/error in production source (modules + gateway)
        run: |
          count=$(grep -rn --include="*.ts" "console\.\(log\|error\|warn\)" src/modules/ src/gateway/ \
            | grep -v "\.test\.ts" | wc -l | tr -d ' ')
          echo "Remaining console.* calls in modules/gateway: $count"
          if [ "$count" -gt "0" ]; then
            grep -rn --include="*.ts" "console\.\(log\|error\|warn\)" src/modules/ src/gateway/ | grep -v "\.test\.ts"
            exit 1
          fi
      - name: No raw sql string interpolation (SQL injection risk)
        run: |
          # Catch template literals used directly in query() calls — should use parameterized @key syntax.
          ! grep -rn --include="*.ts" "\.query\(\`.*\${" src/modules/ src/gateway/ \
            | grep -v "\.test\.ts\|set_config\|schema" \
            || (echo "❌ Raw string interpolation in SQL query — use @param syntax instead" && exit 1)
          echo "No raw SQL interpolation found ✓"

  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finder_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finder_test
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # PROD-17: run tests. Coverage threshold enforcement deferred until
      # baseline is measured (PROD-18 adds tests for the 9 uncovered modules).
      # Add --coverage flag once baseline is set to track regressions.
      - run: npm test

  frontend:
    name: Frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Scope is resolved automatically from .vercel/project.json (created by
      # `vercel link` during repo setup). No --scope flag needed at runtime.
      - run: npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel propagation
        run: sleep 15
      - name: Health check — backend liveness
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/healthz \
            || (echo "❌ /healthz failed" && exit 1)
      - name: Health check — backend readiness
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/readyz \
            || (echo "❌ /readyz failed" && exit 1)
      - name: Health check — feature flags endpoint
        run: |
          curl -f --retry 2 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/api/v1/flags \
            || (echo "❌ /api/v1/flags failed" && exit 1)
      - name: Health check — frontend
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-frontend.vercel.app/ \
            || (echo "❌ frontend failed" && exit 1)
